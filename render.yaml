# Render blueprint — backend only. Frontend lives on Vercel, database is
# external Postgres (Neon or similar), so this deploys exactly one service:
# the FastAPI backend as a Docker web service (Docker because Playwright
# needs its Chromium binary and OS libraries baked into the image).
#
# After connecting the repo in Render, set these three env vars in the
# dashboard (all marked sync: false below so they never land in git):
#
#   DATABASE_URL   postgresql+asyncpg://USER:PASS@HOST/DB?ssl=require
#                  note the +asyncpg driver and ?ssl=require — asyncpg
#                  rejects the libpq-style ?sslmode=require spelling
#   GROQ_API_KEY   from console.groq.com
#   SECRET_KEY     one strong random value, set once and never rotated —
#                  user SMTP passwords are encrypted with a key derived
#                  from it, rotating it locks every user out of sending
#                  until they re-enter their app password
#   FRONTEND_URL   https://your-app.vercel.app  (exact origin, no trailing
#                  slash — this is what CORS allows)
#
# Mail sending. There is no shared server side sender: every email leaves
# from the sending user's own address. Two ways that happens:
#
#   1. The user opens the draft in their own mail app (mailto), which
#      needs nothing configured here at all — it is always available.
#   2. The user connects their own Gmail for one click sending, either:
#
#   GOOGLE_CLIENT_ID       Gmail OAuth — the user connects their Google
#   GOOGLE_CLIENT_SECRET   account and mail leaves from their literal
#                          address over the Gmail HTTPS API (Render blocks
#                          raw SMTP, the API is not blocked). OAuth client
#                          from console.cloud.google.com, type Web
#                          application, redirect URI registered exactly:
#                          https://YOUR-RENDER-URL/api/v1/email/oauth/callback
#                          While the OAuth app is unverified (Testing
#                          mode), only test users added in Google Cloud
#                          Console (Audience, Test users) can connect —
#                          everyone else uses option 1 above.
#   BACKEND_URL            https://YOUR-RENDER-URL (no trailing slash) —
#                          must match the host in that redirect URI.
#
#   RELAY_URL              App password path (self hosted / dev only).
#   RELAY_SECRET           Render blocks outbound SMTP, so an app password
#                          only sends when RELAY_URL points at a relay
#                          service (see relay/) on a host that allows
#                          outbound SMTP. Left unset in production, where
#                          this path stays dormant; options 1 and 2 cover
#                          sending. RELAY_SECRET must match the relay.

services:
  - type: web
    name: applypilot-backend
    runtime: docker
    rootDir: backend
    plan: standard   # Playwright + Chromium OOM on 512MB; 2GB is the safe floor
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: RELAY_URL
        sync: false
      - key: RELAY_SECRET
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: ENVIRONMENT
        value: production
      - key: UPLOAD_DIR
        value: /app/uploads
