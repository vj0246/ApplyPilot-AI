version: "3.9"

services:

  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-applypilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applypilot}
      POSTGRES_DB: ${POSTGRES_DB:-applypilot}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applypilot}"]
      interval: 5s
      retries: 10

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ap_backend
    restart: unless-stopped
    # Dockerfile CMD is production (no --reload); this override keeps hot
    # reload for local dev, where ./backend is bind-mounted below.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-applypilot}:${POSTGRES_PASSWORD:-applypilot}@db:5432/${POSTGRES_DB:-applypilot}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      retries: 10
      start_period: 20s
    # Chromium (used by the Google Form autofill feature) needs more
    # than Docker's default 64MB of /dev/shm or it crashes randomly
    # mid-render on anything but the simplest pages. 1GB is generous —
    # a single headless tab doesn't need much more than this in practice.
    shm_size: "1gb"

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ap_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  uploads:
